version: '3.8'

services:
  pg-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pg-mcp
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - pg-mcp-network

networks:
  pg-mcp-network:
    driver: bridge
